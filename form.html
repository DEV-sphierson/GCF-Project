<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form</title>
  <link rel="stylesheet" href="form.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
  <div class="wrapper">
    <span class="bg-animate"></span>
    <span class="bg-animate2"></span>
    <div class="form-box login">
      <h2 class="animation" style="--i:0; --j:20;">Login</h2>
      <form action="#">
        <div class="input-box animation" style="--i:1; --j:21;">
          <input type="text" required>
          <label>Username</label>
          <i class='bx bxs-user'></i>
        </div>
        <div class="input-box animation" style="--i:2; --j:22;">
          <input type="password" required>
          <label>Password</label>
          <i class='bx bxs-lock bx-flashing'></i>
        </div>
        <button type="button" class="btn animation" style="--i:3; --j:23;"
          onclick="window.location.href='movie.html'">Login</button>
        <div class="logreg-link animation" style="--i:4; --j:24;">
          <p>Don't have an account? <a href="#" class="register-link">Sign Up</a></p>
        </div>
      </form>
    </div>
    <div class="info-text login">
      <h2 class="animation" style="--i:0; --j:20;">Welcome Back!</h2>
      <p class="animation" style="--i:1; --j:21;">Please enter your details to login.</p>
    </div>
    <div class="form-box register">
      <h2 class="animation" style="--i:17; --j:0;">Register</h2>
      <form action="#">
        <div class="input-box animation" style="--i:18; --j:1;">
          <input type="text" required>
          <label>Username</label>
          <i class='bx bxs-user'></i>
        </div>
        <div class="input-box animation" style="--i:19; --j:2;">
          <input type="text" required>
          <label>Email</label>
          <i class='bx bxs-envelope bx-tada'></i>
        </div>
        <div class="input-box animation" style="--i:20; --j:3;">
          <input type="password" required>
          <label>Password</label>
          <i class='bx bxs-lock bx-flashing'></i>
        </div>
        <button type="submit" class="btn animation" style="--i:21; --j:4;"
          onclick="window.location.href='movie.html'">Register</button>
        <div class="logreg-link animation" style="--i:22; --j:5;">
          <p>Already have an account? <a href="#" class="login-link">Sign In</a></p>
        </div>
      </form>
    </div>
    <div class="info-text register">
      <h2 class="animation" style="--i:17; --j:0;">Join Us!</h2>
      <p class="animation" style="--i:18; --j:1;"> Please fill in your details to create an account.</p>
    </div>
  </div>
  <script src="form.js"></script>
</body>

</html>
